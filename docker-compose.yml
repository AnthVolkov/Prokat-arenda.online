version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./wordpress:/var/www/html
      - ./docker/nginx:/etc/nginx/conf.d

  php:
    image: php:8.3-fpm
    volumes:
      - ./wordpress:/var/www/html

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: root
